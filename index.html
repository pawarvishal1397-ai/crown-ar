<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Thanos AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }

    #video {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    #canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* mirrored class — applied to both video + canvas for front cam */
    .mirrored { transform: scaleX(-1); }

    #flip-btn {
      position: fixed; top: 18px; right: 18px; z-index: 200;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 50px;
      padding: 10px 16px;
      font-size: 22px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #status {
      position: fixed; bottom: 28px;
      left: 50%; transform: translateX(-50%);
      z-index: 200;
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      text-align: center;
      max-width: 85vw;
      transition: opacity 0.6s;
      pointer-events: none;
    }

    /* loading spinner */
    #loader {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 300;
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 5px solid rgba(150,80,255,0.3);
      border-top-color: #9f50ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .loader-text {
      color: #fff; font-size: 15px;
      font-family: -apple-system, sans-serif;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<button id="flip-btn">🔄</button>
<div id="status">Initializing…</div>
<div id="loader">
  <div class="spinner"></div>
  <div class="loader-text" id="loader-text">Starting up…</div>
</div>

<!-- Three.js importmap (local files) -->
<script type="importmap">
{ "imports": {
    "three": "./libs/three.module.min.js",
    "three/addons/": "./libs/addons/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ───────────────────────────────────────────────
// MediaPipe CDN endpoints
// ───────────────────────────────────────────────
const MP_WASM  = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm';
const MP_MODEL = 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task';

// ───────────────────────────────────────────────
// Bip001 bone → [MediaPipe from-idx, to-idx]
// ───────────────────────────────────────────────
const RETARGET = [
  // Arms
  { name: 'bip001 l upperarm_026', from: 11, to: 13 },
  { name: 'bip001 l forearm_022',  from: 13, to: 15 },
  { name: 'bip001 r upperarm_051', from: 12, to: 14 },
  { name: 'bip001 r forearm_047',  from: 14, to: 16 },
  // Legs
  { name: 'bip001 l thigh_024',    from: 23, to: 25 },
  { name: 'bip001 l calf_04',      from: 25, to: 27 },
  { name: 'bip001 r thigh_049',    from: 24, to: 26 },
  { name: 'bip001 r calf_029',     from: 26, to: 28 },
];

// ───────────────────────────────────────────────
// DOM
// ───────────────────────────────────────────────
const video      = document.getElementById('video');
const canvas     = document.getElementById('canvas');
const statusEl   = document.getElementById('status');
const loaderEl   = document.getElementById('loader');
const loaderText = document.getElementById('loader-text');
const flipBtn    = document.getElementById('flip-btn');

// ───────────────────────────────────────────────
// State
// ───────────────────────────────────────────────
let facingMode     = 'environment';
let poseLandmarker = null;
let thanosRoot     = null;   // Group wrapper for model
let boneMap        = {};
let modelSwDist    = 1;      // shoulder-to-shoulder distance in model space
let lastVidTime    = -1;

// ───────────────────────────────────────────────
// Three.js — orthographic camera
// ───────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

let W = window.innerWidth, H = window.innerHeight, aspect = W / H;
renderer.setSize(W, H);

const scene  = new THREE.Scene();
// Ortho: x ∈ [-aspect, aspect], y ∈ [-1, 1]
const camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 50);
camera.position.z = 10;

// Lighting  — warm purple tint for Thanos vibe
scene.add(new THREE.AmbientLight(0xffffff, 1.0));
const keyLight = new THREE.DirectionalLight(0xffd0a0, 2.2);
keyLight.position.set(1, 3, 4);
scene.add(keyLight);
const rimLight = new THREE.DirectionalLight(0x7040ff, 0.8);
rimLight.position.set(-3, 1, -2);
scene.add(rimLight);

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight; aspect = W / H;
  renderer.setSize(W, H);
  camera.left = -aspect; camera.right = aspect;
  camera.updateProjectionMatrix();
});

// ───────────────────────────────────────────────
// Status helpers
// ───────────────────────────────────────────────
function setStatus(msg, autoHide = false) {
  statusEl.textContent = msg;
  statusEl.style.opacity = '1';
  if (autoHide) setTimeout(() => { statusEl.style.opacity = '0'; }, 3500);
}

function setLoader(msg) {
  loaderText.textContent = msg;
  loaderEl.style.display = 'flex';
}

function hideLoader() {
  loaderEl.style.display = 'none';
}

// ───────────────────────────────────────────────
// Camera
// ───────────────────────────────────────────────
async function startCamera() {
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    video.play();
  } catch (e) {
    setStatus('Camera error: ' + e.message);
    throw e;
  }
}

// Mirror both video + canvas together for front camera
function applyMirror() {
  const m = facingMode === 'user';
  video.classList.toggle('mirrored', m);
  canvas.classList.toggle('mirrored', m);
}

flipBtn.addEventListener('click', async () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  applyMirror();
  await startCamera();
});

// ───────────────────────────────────────────────
// MediaPipe PoseLandmarker
// ───────────────────────────────────────────────
async function initPose() {
  setLoader('Loading pose AI…');
  const { PoseLandmarker, FilesetResolver } = await import(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm'
  );
  const vision = await FilesetResolver.forVisionTasks(MP_WASM);
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: MP_MODEL,
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    numPoses: 1,
    minPoseDetectionConfidence: 0.5,
    minPosePresenceConfidence: 0.5,
    minTrackingConfidence: 0.5,
    outputSegmentationMasks: false,
  });
}

// ───────────────────────────────────────────────
// Load Thanos GLB
// ───────────────────────────────────────────────
async function loadThanos() {
  setLoader('Loading Thanos…');
  return new Promise((resolve, reject) => {
    new GLTFLoader().load(
      './assets/thanos.glb',
      gltf => {
        const model = gltf.scene;

        // Collect all bones
        model.traverse(obj => {
          if (obj.isBone) boneMap[obj.name] = obj;
        });

        // Compute rest-pose state for every bone
        model.updateMatrixWorld(true);
        model.traverse(obj => {
          if (!obj.isBone) return;
          const kids = obj.children.filter(c => c.isBone);
          // "pointing direction" = toward first bone child, in local parent space
          obj.userData.restLocalDir = kids.length > 0
            ? kids[0].position.clone().normalize()
            : new THREE.Vector3(0, 1, 0);
          obj.userData.restQuat = obj.quaternion.clone();
        });

        // Measure shoulder-to-shoulder in model space (for scale)
        const lClav = boneMap['bip001 l clavicle_05'];
        const rClav = boneMap['bip001 r clavicle_030'];
        if (lClav && rClav) {
          const a = new THREE.Vector3(), b = new THREE.Vector3();
          lClav.getWorldPosition(a); rClav.getWorldPosition(b);
          modelSwDist = a.distanceTo(b);
        }

        // Wrap in a group so we can freely transform without affecting bone space
        thanosRoot = new THREE.Group();
        thanosRoot.add(model);
        scene.add(thanosRoot);

        resolve();
      },
      xhr => {
        if (xhr.total) setLoader(`Loading Thanos… ${Math.round(xhr.loaded / xhr.total * 100)}%`);
      },
      reject
    );
  });
}

// ───────────────────────────────────────────────
// Retargeting helpers
// ───────────────────────────────────────────────

// Normalised screen landmark → orthographic scene position
function lmToScene(lm) {
  return new THREE.Vector3(
    (lm.x - 0.5) * 2 * aspect,
    -(lm.y - 0.5) * 2,
    0
  );
}

// Direction vector from world landmark A → B  (MediaPipe world = Y-up, matches Three.js)
function wlDir(wl, a, b) {
  return new THREE.Vector3(
    wl[b].x - wl[a].x,
    wl[b].y - wl[a].y,
    wl[b].z - wl[a].z
  ).normalize();
}

// Point a bone along a given WORLD direction
function aimBone(bone, worldDir) {
  if (!bone?.userData?.restLocalDir) return;

  // Parent's current world rotation
  bone.parent.updateWorldMatrix(true, false);
  const pq = new THREE.Quaternion();
  bone.parent.getWorldQuaternion(pq);

  // Target in parent-local space
  const localTarget = worldDir.clone().applyQuaternion(pq.invert()).normalize();
  const restDir     = bone.userData.restLocalDir.clone().normalize();

  if (restDir.lengthSq() < 0.01 || localTarget.lengthSq() < 0.01) return;

  const dot = restDir.dot(localTarget);
  if (dot < -0.9999) {
    // Anti-parallel: rotate 180° around a perpendicular axis
    const perp = (Math.abs(restDir.x) < 0.9)
      ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 1, 0);
    bone.quaternion.setFromAxisAngle(
      new THREE.Vector3().crossVectors(restDir, perp).normalize(),
      Math.PI
    );
  } else {
    bone.quaternion.setFromUnitVectors(restDir, localTarget);
  }
}

// ───────────────────────────────────────────────
// Apply pose each frame
// ───────────────────────────────────────────────
function applyPose(lm, wl) {
  if (!thanosRoot) return;

  const vis = i => lm[i]?.visibility ?? 0;

  // Need at least shoulders + hips
  if (vis(11) < 0.3 || vis(12) < 0.3 || vis(23) < 0.3 || vis(24) < 0.3) return;

  // ── Position: anchor model at hip midpoint ──
  const hipScene = lmToScene({
    x: (lm[23].x + lm[24].x) / 2,
    y: (lm[23].y + lm[24].y) / 2,
  });

  // ── Scale: map model shoulder width → screen shoulder width ──
  const lss = lmToScene(lm[11]);
  const rss = lmToScene(lm[12]);
  const screenSW = lss.distanceTo(rss);
  const scale    = screenSW / (modelSwDist + 0.0001);

  thanosRoot.scale.setScalar(scale);
  thanosRoot.position.set(hipScene.x, hipScene.y, -2);

  // ── Spine: hip-mid → shoulder-mid ──
  const hmw = {
    x: (wl[23].x + wl[24].x) / 2,
    y: (wl[23].y + wl[24].y) / 2,
    z: (wl[23].z + wl[24].z) / 2,
  };
  const smw = {
    x: (wl[11].x + wl[12].x) / 2,
    y: (wl[11].y + wl[12].y) / 2,
    z: (wl[11].z + wl[12].z) / 2,
  };
  const spineDir = new THREE.Vector3(
    smw.x - hmw.x, smw.y - hmw.y, smw.z - hmw.z
  ).normalize();
  aimBone(boneMap['bip001 spine_052'], spineDir);

  // ── Limbs ──
  for (const { name, from, to } of RETARGET) {
    if (vis(from) > 0.25 && vis(to) > 0.25) {
      aimBone(boneMap[name], wlDir(wl, from, to));
    }
  }
}

// ───────────────────────────────────────────────
// Render loop
// ───────────────────────────────────────────────
function tick() {
  requestAnimationFrame(tick);

  if (poseLandmarker && video.readyState >= 2 && video.currentTime !== lastVidTime) {
    lastVidTime = video.currentTime;
    try {
      const r = poseLandmarker.detectForVideo(video, performance.now());
      if (r.landmarks?.[0]) {
        applyPose(r.landmarks[0], r.worldLandmarks[0]);
      }
    } catch (_) { /* skip frame on error */ }
  }

  renderer.render(scene, camera);
}

// ───────────────────────────────────────────────
// Boot
// ───────────────────────────────────────────────
(async () => {
  try {
    await startCamera();
    applyMirror();

    setLoader('Loading…');
    await Promise.all([initPose(), loadThanos()]);

    hideLoader();
    setStatus('🟣  Move into frame — full body visible!', true);
    tick();
  } catch (e) {
    hideLoader();
    setStatus('Error: ' + e.message);
    console.error(e);
  }
})();
</script>
</body>
</html>
