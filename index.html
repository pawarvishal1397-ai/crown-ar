<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Name AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #06010f; overflow: hidden; width: 100vw; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── LANDING PAGE ── */
    #landing {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
      background: radial-gradient(ellipse at 50% 40%, #1a0540 0%, #06010f 70%);
    }

    .stars {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .star {
      position: absolute; background: #fff; border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.9; } }

    .landing-icon { font-size: 60px; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    .landing-title {
      color: #fff;
      font-size: clamp(26px, 8vw, 44px);
      font-weight: 800;
      text-align: center;
      letter-spacing: -0.5px;
    }
    .landing-sub {
      color: rgba(255,255,255,0.5);
      font-size: clamp(13px, 4vw, 17px);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }

    #name-input {
      width: min(340px, 85vw);
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 60px;
      color: #fff;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 600;
      padding: 16px 28px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: #a855f7;
    }
    #name-input::placeholder { color: rgba(255,255,255,0.25); }
    #name-input:focus {
      border-color: #a855f7;
      box-shadow: 0 0 0 4px rgba(168,85,247,0.2);
    }

    #ok-btn {
      width: min(340px, 85vw);
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none; border-radius: 60px;
      font-size: clamp(17px, 5vw, 22px);
      font-weight: 700;
      padding: 16px 28px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(124,58,237,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #ok-btn:active { transform: scale(0.96); box-shadow: 0 4px 16px rgba(124,58,237,0.3); }
    #ok-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── AR VIEW ── */
    #ar-wrap {
      position: fixed; inset: 0; z-index: 1;
      display: none;
    }

    /* flip button */
    #flip-btn {
      position: fixed; top: 18px; right: 18px; z-index: 300;
      background: rgba(0,0,0,0.55);
      color: #fff; border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50px; padding: 10px 16px;
      font-size: 22px; cursor: pointer;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* loading overlay */
    #loader {
      position: fixed; inset: 0; z-index: 400;
      background: #06010f;
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 18px;
    }
    .spinner {
      width: 54px; height: 54px;
      border: 5px solid rgba(168,85,247,0.25);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-label {
      color: rgba(255,255,255,0.7);
      font-size: 15px;
    }

    /* status toast */
    #status {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 300;
      background: rgba(0,0,0,0.65);
      color: #fff; padding: 10px 22px;
      border-radius: 24px; font-size: 14px;
      white-space: nowrap;
      opacity: 0; transition: opacity 0.4s;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- ── LANDING ── -->
<div id="landing">
  <div class="stars" id="stars"></div>
  <div class="landing-icon">✨</div>
  <div class="landing-title">See Your Name<br>in Augmented Reality</div>
  <div class="landing-sub">Enter your name and point the camera at a face</div>
  <input id="name-input" type="text" placeholder="Your name…" maxlength="18" autocomplete="off" autocorrect="off" spellcheck="false" />
  <button id="ok-btn">Start AR →</button>
</div>

<!-- ── AR ── -->
<div id="ar-wrap"></div>
<button id="flip-btn">🔄</button>
<div id="loader"><div class="spinner"></div><div class="loader-label" id="loader-label">Loading face model…</div></div>
<div id="status"></div>

<script type="importmap">
{ "imports": {
    "three": "./libs/three.module.min.js",
    "three/addons/": "./libs/addons/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { MindARThree } from './libs/mindar-face-three.prod.js';

// ── Generate star field ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%; left:${Math.random()*100}%;
    --d:${(Math.random()*2+1).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

// ── DOM refs ──
const landingEl   = document.getElementById('landing');
const arWrapEl    = document.getElementById('ar-wrap');
const flipBtn     = document.getElementById('flip-btn');
const loaderEl    = document.getElementById('loader');
const loaderLabel = document.getElementById('loader-label');
const statusEl    = document.getElementById('status');
const nameInput   = document.getElementById('name-input');
const okBtn       = document.getElementById('ok-btn');

// ── State ──
let facingMode  = 'environment';
let mindarThree = null;
let nameMesh    = null;
let userName    = '';

// ── Status toast ──
function toast(msg, duration = 3000) {
  statusEl.textContent = msg;
  statusEl.style.opacity = '1';
  clearTimeout(statusEl._t);
  statusEl._t = setTimeout(() => { statusEl.style.opacity = '0'; }, duration);
}

// ── Build canvas texture with the name ──
function buildNameMesh(name) {
  // Measure text to size canvas dynamically
  const FONT_SIZE = 110;
  const CANVAS_H  = 180;
  const PAD_X     = 64;

  const tmpCtx = document.createElement('canvas').getContext('2d');
  tmpCtx.font = `bold ${FONT_SIZE}px -apple-system, Arial`;
  const textW  = tmpCtx.measureText(name).width;
  const canvasW = Math.ceil(textW + PAD_X * 2);

  const c   = document.createElement('canvas');
  c.width   = canvasW;
  c.height  = CANVAS_H;
  const ctx = c.getContext('2d');

  // Pill background
  const r = CANVAS_H / 2;
  ctx.beginPath();
  if (ctx.roundRect) {
    ctx.roundRect(0, 0, canvasW, CANVAS_H, r);
  } else {
    // Fallback for older browsers
    ctx.moveTo(r, 0);
    ctx.lineTo(canvasW - r, 0);
    ctx.arcTo(canvasW, 0, canvasW, r, r);
    ctx.lineTo(canvasW, CANVAS_H - r);
    ctx.arcTo(canvasW, CANVAS_H, canvasW - r, CANVAS_H, r);
    ctx.lineTo(r, CANVAS_H);
    ctx.arcTo(0, CANVAS_H, 0, CANVAS_H - r, r);
    ctx.lineTo(0, r);
    ctx.arcTo(0, 0, r, 0, r);
    ctx.closePath();
  }
  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, canvasW, CANVAS_H);
  grad.addColorStop(0, 'rgba(124,58,237,0.75)');
  grad.addColorStop(1, 'rgba(79,70,229,0.75)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth   = 3;
  ctx.stroke();

  // Glow + text
  ctx.shadowColor  = 'rgba(255,255,255,0.9)';
  ctx.shadowBlur   = 18;
  ctx.font         = `bold ${FONT_SIZE}px -apple-system, Arial`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle    = '#ffffff';
  ctx.fillText(name, canvasW / 2, CANVAS_H / 2);

  // Plane — keep canvas aspect ratio, height ≈ 0.45 MindAR units
  const planeH = 0.45;
  const planeW = (canvasW / CANVAS_H) * planeH;

  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(planeW, planeH),
    new THREE.MeshBasicMaterial({
      map: new THREE.CanvasTexture(c),
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide,
    })
  );
  return mesh;
}

// ── Force camera facing mode before MindAR grabs it ──
function overrideCamera(mode) {
  const original = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
  navigator.mediaDevices.getUserMedia = constraints => {
    if (constraints?.video) {
      constraints.video = Object.assign(
        typeof constraints.video === 'object' ? constraints.video : {},
        { facingMode: mode }
      );
    }
    return original(constraints);
  };
}

// ── Start AR ──
async function startAR() {
  // Show loader, hide landing
  landingEl.style.display = 'none';
  loaderEl.style.display  = 'flex';
  loaderLabel.textContent = 'Loading face model…';

  overrideCamera(facingMode);

  mindarThree = new MindARThree({
    container: arWrapEl,
    uiLoading: 'no',
    uiError: 'no',
    uiScanning: 'no',
  });

  const { renderer, scene, camera } = mindarThree;

  // Lighting (basic — name is unlit canvas texture so ambient is enough)
  scene.add(new THREE.AmbientLight(0xffffff, 1));

  // Anchor = landmark 10 (top of forehead)
  const anchor = mindarThree.addAnchor(10);

  // Build name mesh and attach
  nameMesh = buildNameMesh(userName);
  nameMesh.position.set(0, 0.55, 0);  // above top of head
  anchor.group.add(nameMesh);

  // Floating animation loop
  const clock = new THREE.Clock();
  renderer.setAnimationLoop(() => {
    const t = clock.getElapsedTime();
    if (nameMesh) {
      nameMesh.position.y = 0.18 + Math.sin(t * 2.2) * 0.012;
    }
    renderer.render(scene, camera);
  });

  try {
    await mindarThree.start();
  } catch (e) {
    toast('Camera error: ' + e.message, 5000);
  }

  loaderEl.style.display = 'none';
  arWrapEl.style.display  = 'block';
  flipBtn.style.display   = 'block';

  toast('👆 Point camera at a face!', 3500);
}

// ── OK button ──
okBtn.addEventListener('click', () => {
  const val = nameInput.value.trim();
  if (!val) { nameInput.focus(); nameInput.style.borderColor = '#ef4444'; return; }
  nameInput.style.borderColor = '';
  userName = val;
  startAR();
});

nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') okBtn.click();
});

// ── Camera flip ──
flipBtn.addEventListener('click', async () => {
  if (!mindarThree) return;
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  toast(facingMode === 'user' ? '📷 Front camera' : '📷 Back camera', 2000);

  // Restart MindAR with new camera
  await mindarThree.stop();
  arWrapEl.innerHTML = '';

  overrideCamera(facingMode);

  mindarThree = new MindARThree({
    container: arWrapEl,
    uiLoading: 'no', uiError: 'no', uiScanning: 'no',
  });

  const { renderer, scene, camera } = mindarThree;
  scene.add(new THREE.AmbientLight(0xffffff, 1));

  const anchor = mindarThree.addAnchor(10);
  nameMesh = buildNameMesh(userName);
  nameMesh.position.set(0, 0.18, 0);
  anchor.group.add(nameMesh);

  const clock = new THREE.Clock();
  renderer.setAnimationLoop(() => {
    const t = clock.getElapsedTime();
    if (nameMesh) nameMesh.position.y = 0.55 + Math.sin(t * 2.2) * 0.012;
    renderer.render(scene, camera);
  });

  await mindarThree.start();
});

// ── Auto-focus input ──
nameInput.focus();
</script>
</body>
</html>
